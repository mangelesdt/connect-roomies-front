name: Deploy Angular + Back

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Copy deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Test SSH connection
        run: ssh -o StrictHostKeyChecking=no angel@webafrdaw.com "echo 'Connected!'"

      - name: Deploy backend
        run: ssh -o StrictHostKeyChecking=no angel@webafrdaw.com "
          cd /home/angel/ConnectRoomies &&
          git pull &&
          ./restart-back.sh
        "
        
      - name: Deploy Angular (opcional si lo quieres también)
        run: ssh -o StrictHostKeyChecking=no angel@webafrdaw.com "
          cd /var/www/html &&
          git pull &&
          npm install &&
          ng build --prod
        "
